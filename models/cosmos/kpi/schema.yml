version: 2

models:
  - name: vw_aderencia_escala
    description: |
      View que calcula a aderencia a escala dos colaboradores.
      Gera um JSON com as variaveis de escalas atendidas e escalas totais, agregadas por polo e contrato.
      Indicador ID = 2 ("ADERENCIA ESCALA").
    config:
      tags: ['kpi', 'aderencia', 'escala', 'cosmos']
    columns:
      - name: dt_ref
        description: "Data de referencia (DATE) - data da escala"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo no sistema Cosmos"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato no sistema Cosmos"
        tests:
          - not_null
      - name: escalas_atendidas
        description: "Quantidade de escalas com estado ADERENTE (variavelIndicadorId = 3)"
      - name: escalas_totais
        description: "Quantidade total de escalas nos estados: ADIANTADO, AUSENTE, ADERENTE, ATRASADO (variavelIndicadorId = 4)"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis para integracao com Cosmos"

  - name: vw_corte_1
    description: |
      View que calcula o KPI de Corte Prioridade 1 (P1).
      Compara ordens de corte geradas versus executadas para prioridade P1.
      Indicador ID = 11 ("Corte Prioridade 1").
    config:
      tags: ['kpi', 'corte', 'prioridade', 'cosmos']
    columns:
      - name: dt_ref
        description: "Data de referencia (DATE) - data da execucao em campo"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo no sistema Cosmos"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato no sistema Cosmos"
        tests:
          - not_null
      - name: gerados
        description: "Quantidade de notas de corte P1 geradas (variavelIndicadorId = 32)"
      - name: executados
        description: "Quantidade de notas executadas no mesmo contrato e mes da atribuicao (variavelIndicadorId = 31)"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis"

  - name: vw_corte_2
    description: |
      View que calcula o KPI de Corte Prioridade 2 (P2).
      Mesma logica do Corte P1, porem para ordens de prioridade P2.
      Indicador ID = 12 ("Corte Prioridade 2").
    config:
      tags: ['kpi', 'corte', 'prioridade', 'cosmos']
    columns:
      - name: dt_ref
        description: "Data de referencia (DATE) - data da execucao em campo"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo no sistema Cosmos"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato no sistema Cosmos"
        tests:
          - not_null
      - name: gerados
        description: "Quantidade de notas de corte P2 geradas (variavelIndicadorId = 34)"
      - name: executados
        description: "Quantidade de notas executadas no mesmo contrato e mes da atribuicao (variavelIndicadorId = 33)"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis"

  - name: vw_disponibilidade_oper
    description: |
      View que calcula a Disponibilidade Operacional das equipes.
      Compara o tempo disponivel com a jornada prevista.
      Indicador ID = 1 ("DISPONIBILIDADE OPERACIONAL").
    config:
      tags: ['kpi', 'disponibilidade', 'operacional', 'cosmos']
    columns:
      - name: dt_ref
        description: "Data de referencia (DATE)"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo no sistema Cosmos"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato no sistema Cosmos"
        tests:
          - not_null
      - name: tempo_disponivel
        description: "Tempo disponivel do recurso em minutos (variavelIndicadorId = 2)"
      - name: jornada_prevista
        description: "Jornada de trabalho prevista em minutos (variavelIndicadorId = 1)"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis"

  - name: vw_mepe_comercial
    description: |
      View que calcula o KPI de Desenvolvimento de Equipes - Comercial (MEPE Comercial).
      Classifica e conta colaboradores por classe (A, B, C, D) baseado na avaliacao MEPE.
      Indicador ID = 16 ("Desenvolvimento de Equipes - Comercial").
    config:
      tags: ['kpi', 'mepe', 'comercial', 'cosmos']
    columns:
      - name: data
        description: "Data de competencia (primeiro dia do mes)"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo no sistema Cosmos"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato no sistema Cosmos"
        tests:
          - not_null
      - name: classe_mepe_ups
        description: "Classe de avaliacao MEPE (A, B, C ou D)"
      - name: qtd
        description: "Quantidade de colaboradores na classe"
      - name: variavel_indicador_id
        description: "ID da variavel do indicador por classe: A=43, B=44, C=45, D=46"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis para todas as classes"

  - name: vw_mepe_ups
    description: |
      View que calcula o KPI de Desenvolvimento de Equipes - UPS (MEPE UPS).
      Classifica colaboradores pela classe final de MEPE para equipes UPS.
      Indicador ID = 15 ("Desenvolvimento de Equipes - UPS").
    config:
      tags: ['kpi', 'mepe', 'ups', 'cosmos']
    columns:
      - name: data
        description: "Data de competencia derivada de dh_competencia (formato YYYYMM)"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo (obtido via join com dim_polos e dim_polos_cosmos)"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato (obtido via join com dim_contratos_cosmos)"
        tests:
          - not_null
      - name: classe_mepe_final
        description: "Classe final de avaliacao MEPE (A, B, C ou D)"
      - name: qtd
        description: "Quantidade de colaboradores na classe"
      - name: variavel_indicador_id
        description: "ID da variavel do indicador por classe: A=39, B=40, C=41, D=42"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis para todas as classes"

  - name: vw_primeira_visita
    description: |
      View que calcula o KPI de Primeira Visita.
      Mede a quantidade de ocorrencias resolvidas na primeira visita versus o total.
      Indicador ID = 20 ("Primeira Visita").
    config:
      tags: ['kpi', 'primeira_visita', 'cosmos']
    columns:
      - name: dt_ref
        description: "Data de referencia (DATE)"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo no sistema Cosmos"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato no sistema Cosmos"
        tests:
          - not_null
      - name: ocorrencia_1_visita
        description: "Quantidade de ocorrencias resolvidas na primeira visita (variavelIndicadorId = 101)"
      - name: total_ocorrencia
        description: "Quantidade total de ocorrencias (variavelIndicadorId = 102)"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis"

  - name: vw_produtiviade_ups
    description: |
      View que calcula a produtividade UPS baseada na classificacao MEPE.
      Conta colaboradores por classe de desempenho.
      Indicador ID = 16 ("MEPE").
    config:
      tags: ['kpi', 'produtividade', 'ups', 'cosmos']
    columns:
      - name: data
        description: "Data de referencia"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo no sistema Cosmos"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato no sistema Cosmos"
        tests:
          - not_null
      - name: classe_mepe_ups
        description: "Classe de avaliacao MEPE UPS (A, B, C ou D)"
      - name: realizado
        description: "Valor realizado mensal"
      - name: dias_uteis
        description: "Quantidade de dias uteis no periodo"
      - name: qtd
        description: "Quantidade de colaboradores na classe"
      - name: variavel_indicador_id
        description: "ID da variavel do indicador por classe: A=43, B=44, C=45, D=46"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis para todas as classes"

  - name: vw_religa
    description: |
      View que calcula o KPI de Religa Vinculada.
      Conta a quantidade de religas e cortes executados para analise de vinculacao.
      Indicador ID = 17 ("Religa Vinculada").
    config:
      tags: ['kpi', 'religa', 'vinculada', 'cosmos']
    columns:
      - name: dt_ref
        description: "Data de referencia (DATE) - data da execucao em campo"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo no sistema Cosmos"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato no sistema Cosmos"
        tests:
          - not_null
      - name: religas
        description: "Quantidade distinta de notas do tipo RELIGA (variavelIndicadorId = 37)"
      - name: cortes
        description: "Quantidade distinta de notas do tipo CORTE (variavelIndicadorId = 38)"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis"

  - name: vw_tms
    description: |
      View que calcula o KPI de Tempo Medio de Servico (TMS).
      Compara o tempo apurado de servico com o tempo medio previsto.
      Indicador ID = 24 ("Reducao Tempo Medio de Servico").
    config:
      tags: ['kpi', 'tms', 'tempo_servico', 'cosmos']
    columns:
      - name: dt_ref
        description: "Data de referencia (DATE) - data da ocorrencia"
        tests:
          - not_null
      - name: polo_id
        description: "Identificador do polo (obtido via join com dim_polos e dim_polos_cosmos)"
        tests:
          - not_null
      - name: contrato_id
        description: "Identificador do contrato (obtido via join com dim_contratos_cosmos)"
        tests:
          - not_null
      - name: tempo_apurado
        description: "Soma do tempo de servico realizado (variavelIndicadorId = 54)"
      - name: tempo_previsto
        description: "Soma do tempo medio de servico esperado (variavelIndicadorId = 55)"
      - name: json_result
        description: "JSON estruturado contendo o indicador e array de variaveis"
