version: 2

models:
  - name: dim_contratos_cosmos
    description: "Dimensão de contratos do sistema Cosmos - dados chumbados com mapeamento para dim_contratos"
    config:
      tags: ['dimension', 'contratos', 'cosmos']
    columns:
      - name: contrato_id
        description: "ID único do contrato no sistema Cosmos"
        tests:
          - unique
          - not_null
      - name: empresa_id
        description: "ID da empresa associada ao contrato"
        tests:
          - not_null
      - name: cod_sap
        description: "Código do contrato no SAP (ID do Cosmos)"
        tests:
          - unique
          - not_null
      - name: fornecedor_id
        description: "ID do fornecedor associado ao contrato"
        tests:
          - not_null
      - name: objeto
        description: "Descrição do objeto do contrato"
        tests:
          - not_null
      - name: contrato_tipo_id
        description: "ID do tipo de contrato"
        tests:
          - not_null
      - name: contrato_ativo
        description: "Status de ativação do contrato (S/N)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['S', 'N']
      - name: contrato_sap
        description: "Código do contrato correspondente na dim_contratos (FK). NULL para contratos sem correspondência"
        tests:
          - relationships:
              arguments:
                to: ref('dim_contratos')
                field: contrato_sap
              config:
                where: "contrato_sap IS NOT NULL"
      - name: dt_atualizacao
        description: "Timestamp da última atualização"
        tests:
          - not_null

  - name: dim_polos_cosmos
    description: "Dimensão de polos do sistema Cosmos - dados chumbados com mapeamento para dim_polos"
    config:
      tags: ['dimension', 'polos', 'cosmos']
    columns:
      - name: polo_id
        description: "ID único do polo no sistema Cosmos"
        tests:
          - unique
          - not_null
      - name: pol_nome
        description: "Nome do polo"
        tests:
          - not_null
      - name: regional_id
        description: "ID da regional associada ao polo"
        tests:
          - not_null
      - name: cod_polo
        description: "Código do polo correspondente na dim_polos (FK). NULL para polos de teste sem correspondência"
        tests:
          - relationships:
              arguments:
                to: ref('dim_polos')
                field: cod_polo
              config:
                where: "cod_polo IS NOT NULL"
      - name: dt_atualizacao
        description: "Timestamp da última atualização"
        tests:
          - not_null
