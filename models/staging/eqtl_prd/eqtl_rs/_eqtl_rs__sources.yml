version: 2

sources:
  - name: eqtlinfo_prd_rs
    database: eqtlinfo_prd
    schema: eqtl_rs
    config:
      freshness:
        warn_after: {count: 1, period: day}
        error_after: {count: 2, period: day}
    tables:
      - name: notas_servicos_fechadas
        config:
          loaded_at_field: "CAST(data_inclusao_eqtlinfo AS timestamp_tz)"
      - name: visitas_notas
        config:
          loaded_at_field: "cast(data_dados as timestamp_tz)"
      - name: tab_regional_politica
        config:
          loaded_at_field:  "cast(data_dados as timestamp_tz)"

      - name: notas_servicos
        config:
          loaded_at_field: "CAST(data_dados AS timestamp_tz)"
      - name: tmp_medidas_ns
        config:
          loaded_at_field: "CAST(data_dados AS timestamp_tz)"
      - name: int_medidas_servicos_delta
        config:
          loaded_at_field: "CAST(data_dados AS timestamp_tz)"
      - name: medidas_notas_servicos
        config:
          loaded_at_field: "CAST(data_dados AS timestamp_tz)"
      - name: medidas_notas_servicos_1
        config:
          loaded_at_field: "CAST(data_dados AS timestamp_tz)"
      - name: tab_cadastro
        config:
          loaded_at_field: "CAST(data_dados AS timestamp_tz)"
      - name: tab_grpcodes_medidas
        config:
          loaded_at_field: "CAST(data_dados AS timestamp_tz)"
      - name: tab_codes_medidas
        config:
          loaded_at_field: "CAST(data_dados AS timestamp_tz)"
      - name: tab_status_notas