version: 2

models:
  - name: resultado_mepe
    description: |
      Metodologia de Estruturacao do Premio por Equipe (MEPE).
      Indicador composto que avalia: UPS, Retrabalho, Prazo, Primeira Visita e Reincidencia.
      Gera classificacao final (A, B, C, D) para cada equipe.
    config:
      tags: ['production', 'mepe', 'stc', 'legado']
    columns:
      - name: empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: regional_prx
        description: "Regional do prefixo"
      - name: polo_prx
        description: "Polo do prefixo"
      - name: equipe
        description: "Codigo/prefixo da equipe"
        tests:
          - not_null
      - name: processo_prx
        description: "Processo do prefixo"
      - name: tipo_eqp
        description: "Tipo da equipe"
      - name: serv_campo
        description: "Servico de campo"
      - name: fornecedor
        description: "Nome do fornecedor"
      - name: competencia
        description: "Competencia (YYYYMM)"
        tests:
          - not_null
      - name: mes_concl
        description: "Mes de conclusao"
      - name: ano_concl
        description: "Ano de conclusao"
      - name: mepe_ups
        description: "Nota MEPE componente UPS"
      - name: mepe_retra
        description: "Nota MEPE componente Retrabalho"
      - name: mepe_prazo
        description: "Nota MEPE componente Prazo"
      - name: mepe_prim_vis
        description: "Nota MEPE componente Primeira Visita"
      - name: mepe_reincidencia
        description: "Nota MEPE componente Reincidencia"
      - name: mepe_retr_com
        description: "Nota MEPE componente Retrabalho Comercial"
      - name: mepe_final
        description: "Nota MEPE final (media ponderada)"
      - name: classe_mepe_final
        description: "Classificacao final: A, B, C ou D"
      - name: trimestre
        description: "Trimestre de referencia"

  - name: gp_mepe_prazo
    description: "Componente de prazo para calculo MEPE"
    config:
      tags: ['production', 'mepe', 'prazo', 'legado']

  - name: gp_mepe_primvisi
    description: "Componente de primeira visita para calculo MEPE"
    config:
      tags: ['production', 'mepe', 'primeira_visita', 'legado']

  - name: gp_mepe_reinc
    description: "Componente de reincidencia para calculo MEPE"
    config:
      tags: ['production', 'mepe', 'reincidencia', 'legado']

  - name: gp_mepe_retra
    description: "Componente de retrabalho tecnico para calculo MEPE"
    config:
      tags: ['production', 'mepe', 'retrabalho', 'legado']

  - name: gp_mepe_retra_com
    description: "Componente de retrabalho comercial para calculo MEPE"
    config:
      tags: ['production', 'mepe', 'retrabalho_comercial', 'legado']

  - name: gp_mepe_ups
    description: "Componente de UPS para calculo MEPE"
    config:
      tags: ['production', 'mepe', 'ups', 'legado']

  - name: kpi_mepe_comercial
    description: "KPI MEPE para equipes comerciais"
    config:
      tags: ['production', 'mepe', 'comercial', 'legado']

  - name: primeira_visita_global
    description: "Primeira visita agregada para calculo MEPE"
    config:
      tags: ['production', 'mepe', 'primeira_visita', 'legado']

  - name: slv_ans_mepe_stc
    description: "Silver layer - ANS MEPE STC consolidado"
    config:
      tags: ['production', 'mepe', 'silver', 'legado']
