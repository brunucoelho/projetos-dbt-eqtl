version: 2

models:
  - name: slv_reincidente_emerg
    description: |
      Analise de reincidencia de ocorrencias emergenciais.
      Verifica se houve ocorrencia anterior na mesma instalacao em janela de 90 dias.
      Consolida dados de GO e SIGA.
    config:
      tags: ['production', 'reincidencia', 'emergencial', 'silver', 'legado']
    columns:
      - name: data_etl
        description: "Data da carga ETL"
        tests:
          - not_null
      - name: empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: id_interno
        description: "ID interno da ocorrencia"
      - name: os
        description: "Numero da OS"
        tests:
          - not_null
      - name: abrangencia
        description: "Abrangencia da ocorrencia"
      - name: instalacao
        description: "Numero da instalacao"
      - name: prefixo
        description: "Prefixo da equipe"
      - name: dt_conclusao
        description: "Data de conclusao da OS atual"
      - name: causa
        description: "Causa da ocorrencia"
      - name: improcedente
        description: "Flag indicando se foi improcedente"
      - name: os_anterior
        description: "Numero da OS anterior (se reincidente)"
      - name: prefixo_anterior
        description: "Prefixo da equipe da OS anterior"
      - name: dt_conclusao_r
        description: "Data de conclusao da OS anterior"
      - name: causa_r
        description: "Causa da ocorrencia anterior"
      - name: reincidente
        description: "Flag indicando reincidencia (1/0)"
      - name: rein_com_imp
        description: "Reincidente considerando improcedentes"
