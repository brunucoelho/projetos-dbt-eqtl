version: 2

models:
  - name: prazo_sap_stc_al
    description: "Prazo SAP-STC para Alagoas"
    config:
      tags: ['production', 'prazo', 'sap', 'stc', 'al', 'legado']

  - name: prazo_sap_stc_ap
    description: "Prazo SAP-STC para Amapa"
    config:
      tags: ['production', 'prazo', 'sap', 'stc', 'ap', 'legado']

  - name: prazo_sap_stc_ma
    description: "Prazo SAP-STC para Maranhao"
    config:
      tags: ['production', 'prazo', 'sap', 'stc', 'ma', 'legado']

  - name: prazo_sap_stc_pa
    description: "Prazo SAP-STC para Para"
    config:
      tags: ['production', 'prazo', 'sap', 'stc', 'pa', 'legado']

  - name: prazo_sap_stc_pi
    description: "Prazo SAP-STC para Piaui"
    config:
      tags: ['production', 'prazo', 'sap', 'stc', 'pi', 'legado']

  - name: prazo_sap_stc_rs
    description: |
      Analise de prazo de atendimento SAP-STC para Rio Grande do Sul.
      Verifica se notas foram atendidas dentro ou fora do prazo.
    config:
      tags: ['production', 'prazo', 'sap', 'stc', 'rs', 'legado']
    columns:
      - name: empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: regional
        description: "Nome da regional"
      - name: distrital
        description: "Nome da distrital"
      - name: base
        description: "Base operacional"
      - name: seccional
        description: "Seccional"
      - name: municipio
        description: "Municipio"
      - name: localidade
        description: "Localidade"
      - name: conta_contrato
        description: "Conta contrato do cliente"
      - name: instalacao
        description: "Numero da instalacao"
      - name: nota
        description: "Numero da nota"
        tests:
          - not_null
      - name: equipe_execucao
        description: "Equipe que executou o servico"
      - name: tipo_nota
        description: "Tipo da nota"
      - name: grupo_medida
        description: "Grupo de medida"
      - name: codigo_medida
        description: "Codigo da medida"
      - name: mes_competencia
        description: "Mes de competencia"
      - name: data_nota
        description: "Data da nota"
      - name: fim_programado_medida
        description: "Data/hora fim programado"
      - name: data_conclusao_medida
        description: "Data de conclusao"
      - name: status_prazo
        description: "Status: DENTRO_PRAZO ou FORA_PRAZO"
