version: 2

models:
  - name: desligamento_acidental
    description: |
      Registro de desligamentos acidentais causados por falha operacional.
      Inclui erro de operacao ou servico mal executado.
      Consolida dados de diversas fontes.
    config:
      tags: ['production', 'desligamento', 'acidental', 'legado']
    columns:
      - name: data_etl
        description: "Data da carga ETL"
        tests:
          - not_null
      - name: cod_empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: empresa
        description: "Nome da empresa"
      - name: equipe
        description: "Equipe responsavel"
      - name: data
        description: "Data do desligamento"
        tests:
          - not_null
      - name: ano
        description: "Ano do desligamento"
      - name: mes
        description: "Mes do desligamento"
      - name: ocorrencia_id
        description: "ID da ocorrencia"
      - name: causa
        description: "Causa do desligamento"
      - name: sub_causa
        description: "Sub-causa do desligamento"
      - name: abrangencia
        description: "Abrangencia do desligamento (clientes afetados)"
