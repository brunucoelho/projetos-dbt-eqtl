version: 2

models:
  - name: nota_corte
    description: |
      Modelo de producao para notas de corte.
      Consolida dados de notas de corte dos sistemas GO e SIGA.
      Utiliza logica incremental com delete pelo mes de abertura antes de inserir.
    config:
      tags: ['production', 'corte', 'legado']
    columns:
      - name: nota
        description: "Numero da nota de servico"
      - name: dh_abertura
        description: "Data/hora de abertura da nota"
      - name: dh_execucao
        description: "Data/hora de execucao em campo"
      - name: equipe
        description: "Nome/codigo da equipe responsavel"
      - name: polo
        description: "Nome do polo"
      - name: contrato
        description: "Nome do contrato"
      - name: empresa
        description: "Nome da empresa"
      - name: regional
        description: "Nome da regional"
      - name: fornecedor
        description: "Nome do fornecedor"
      - name: prioridade
        description: "Prioridade do corte: P1 ou P2"
      - name: status_execucao
        description: "Status de execucao da nota"
