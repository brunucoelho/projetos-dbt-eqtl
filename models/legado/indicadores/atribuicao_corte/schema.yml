version: 2

models:
  - name: atribuicao_corte
    description: |
      Controle de atribuicao de ordens de corte de energia para equipes de campo.
      Registra quando e para qual equipe a ordem foi atribuida.
    config:
      tags: ['production', 'atribuicao', 'corte', 'legado']
    columns:
      - name: dh_etl
        description: "Data/hora da carga ETL"
        tests:
          - not_null
      - name: cod_empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: nota
        description: "Numero da nota de corte"
        tests:
          - not_null
      - name: dh_atribuicao
        description: "Data/hora da atribuicao para a equipe"
      - name: equipe
        description: "Codigo/prefixo da equipe atribuida"
      - name: status
        description: "Status da atribuicao"

  - name: corte_gerado
    description: |
      Registro de cortes gerados no sistema.
      Inclui datas de geracao, finalizacao e execucao em campo.
    config:
      tags: ['production', 'corte', 'legado']
    columns:
      - name: dh_etl
        description: "Data/hora da carga ETL"
        tests:
          - not_null
      - name: cod_empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: nota
        description: "Numero da nota de corte"
        tests:
          - not_null
      - name: dh_geracao
        description: "Data/hora de geracao da nota"
      - name: dh_finalizado
        description: "Data/hora de finalizacao"
      - name: dh_execucao_campo
        description: "Data/hora da execucao em campo"
      - name: equipe
        description: "Equipe que executou o corte"
      - name: status
        description: "Status da nota de corte"
