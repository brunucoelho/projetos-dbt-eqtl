version: 2

models:
  - name: slv_primeira_visita
    description: |
      Indicador que verifica se o servico emergencial foi concluido na primeira visita.
      Identifica se demandou apoio adicional de outra equipe.
      Consolida dados de GO e SIGA.
    config:
      tags: ['production', 'primeira_visita', 'silver', 'legado']
    columns:
      - name: data_etl
        description: "Data da carga ETL"
        tests:
          - not_null
      - name: empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: os
        description: "Numero da ordem de servico"
        tests:
          - not_null
      - name: data
        description: "Data do atendimento"
      - name: tipo_nota
        description: "Tipo da nota/OS"
      - name: prefixo
        description: "Prefixo/codigo da equipe"
      - name: dt_chegada
        description: "Data/hora de chegada no local"
      - name: ordem_de_visita
        description: "Numero sequencial da visita (1 = primeira)"
      - name: visitas_na_os
        description: "Total de visitas na OS"
      - name: demandou_apoio
        description: "Flag indicando se demandou apoio (1/0)"
