version: 2

models:
  - name: kpi_aderencia_execucao
    description: |
      Indicador que mede a aderencia da programacao de servicos de campo.
      Verifica se a execucao foi realizada dentro da janela permitida.
      Materializado no schema gold como tabela incremental.
    config:
      materialized: incremental
      schema: gold
      tags: ['kpi', 'aderencia', 'execucao', 'legado']
    columns:
      - name: empresa
        description: "Codigo/sigla da empresa"
        tests:
          - not_null
      - name: regional
        description: "Nome da regional"
      - name: contrato
        description: "Nome do contrato"
      - name: processo
        description: "Tipo de processo"
      - name: indicador
        description: "Nome do indicador"
      - name: ano
        description: "Ano de referencia"
      - name: mes
        description: "Mes de referencia"
      - name: unidade
        description: "Unidade de medida"
      - name: polaridade
        description: "Polaridade do indicador (maior melhor / menor melhor)"
      - name: executado
        description: "Quantidade executada dentro da janela"
      - name: programado
        description: "Quantidade total programada"
      - name: resultado
        description: "Percentual de aderencia (executado/programado)"
