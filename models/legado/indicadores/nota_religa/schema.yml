version: 2

models:
  - name: nota_religa
    description: |
      Controle de notas de religamento de energia.
      Inclui prazos, status de execucao e produtividade.
      Consolida dados de GO e SIGA.
    config:
      tags: ['production', 'nota', 'religa', 'legado']
    columns:
      - name: dh_etl
        description: "Data/hora da carga ETL"
        tests:
          - not_null
      - name: cod_empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: cod_polo
        description: "Codigo do polo"
      - name: conta_contrato
        description: "Conta contrato do cliente"
      - name: nota
        description: "Numero da nota de religa"
        tests:
          - not_null
      - name: dh_abertura
        description: "Data/hora de abertura da nota"
      - name: dh_finalizado
        description: "Data/hora de finalizacao"
      - name: dh_limite
        description: "Data/hora limite para execucao"
      - name: dh_execucao_campo
        description: "Data/hora de execucao em campo"
      - name: equipe_conclusao
        description: "Equipe que concluiu a religa"
      - name: status
        description: "Status da nota"
      - name: produtiva
        description: "Flag indicando se foi produtiva (1/0)"
