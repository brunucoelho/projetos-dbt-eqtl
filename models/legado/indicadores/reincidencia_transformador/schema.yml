version: 2

models:
  - name: det_reinc_trafo
    description: |
      Reincidencia de ocorrencias em transformadores.
      Verifica ocorrencias no mesmo transformador em janela de 90 dias.
      Consolidado por estado.
    config:
      tags: ['production', 'reincidencia', 'transformador', 'legado']
    columns:
      - name: empresa
        description: "Codigo da empresa"
        tests:
          - not_null
      - name: regional
        description: "Nome da regional"
      - name: seccional
        description: "Nome da seccional"
      - name: equipe
        description: "Codigo/prefixo da equipe"
      - name: data
        description: "Data da ocorrencia"
        tests:
          - not_null
      - name: data_conclusao
        description: "Data de conclusao"
      - name: natureza
        description: "Natureza da ocorrencia"
      - name: oco_numero
        description: "Numero da ocorrencia"
      - name: oco_id
        description: "ID da ocorrencia"
      - name: abrangencia
        description: "Abrangencia (clientes afetados)"
      - name: pdf
        description: "Ponto de falha"
      - name: tipo_eqp
        description: "Tipo do equipamento"
      - name: chi
        description: "CHI do transformador"
      - name: clie
        description: "Quantidade de clientes"
      - name: reincidente_90_dias
        description: "Flag de reincidencia em 90 dias (1/0)"
      - name: n_reinc
        description: "Numero de reincidencias"
      - name: data_dados
        description: "Data dos dados"

  - name: det_reinc_go
    description: "Reincidencia transformadores - GO"
    config:
      tags: ['production', 'reincidencia', 'transformador', 'go', 'legado']
